name: Daily GitHub Trending Email

on:
  schedule:
    # 7:00 AM Taiwan time (UTC+8) is 23:00 UTC (previous day)
    - cron: '0 23 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows committing archive files back to the repository

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run GitHub Trending Daily Crawler
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: |
          python github_trending_daily.py

      - name: Commit and Push Archive Files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if there are changes in the archive folder
          if [ -d "archive" ]; then
            git add archive/
            if ! git diff --quiet && ! git diff --staged --quiet; then
              git commit -m "Auto-archive GitHub trending report for $(date +'%Y-%m-%d')"
              git checkout -- .
              git pull --rebase origin main
              git push origin main
            else
              echo "No new archive files to commit."
            fi
          else
            echo "No archive folder found."
          fi
